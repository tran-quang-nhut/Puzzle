<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Puzzle THUYNGAN</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">

  <h1 class="title">🧩 Puzzle ThuyNgan</h1>

  <!-- CONTROL -->
  <div class="controls">

    <label class="upload-btn">
      📷 Chọn ảnh
      <input type="file" id="fileInput" accept="image/*">
    </label>

    <select id="level">
      <option value="4">Level 4 mảnh</option>
      <option value="8" selected>Level 8 mảnh</option>
    </select>

    <button id="startBtn">▶ Start</button>
    <button id="pauseBtn">⏸ Pause</button>

    <div id="timer" class="timer">⏱ 100s</div>

    <!-- BG -->
    <div class="audio-box">
      <button id="bgToggle" class="icon-btn">🎵</button>
      <input id="bgVolume" type="range" min="0" max="1" step="0.05" value="0.5">
    </div>

    <!-- SFX -->
    <div class="audio-box">
      <button id="sfxToggle" class="icon-btn">🔊</button>
      <input id="sfxVolume" type="range" min="0" max="1" step="0.05" value="0.6">
    </div>

  </div>

  <!-- MAIN -->
  <div class="main-layout">

    <!-- PREVIEW -->
    <div class="preview-panel">
      <div class="preview-title">Ảnh mẫu</div>
      <img id="previewImage" src="image.jpg" alt="preview">
    </div>

    <!-- GAME -->
    <div class="game-panel">
      <canvas id="gameCanvas"></canvas>
    </div>

  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">

  <div class="popup-box">

    <canvas id="confettiCanvas"></canvas>

    <div id="popupEmoji" class="popup-emoji">🎉</div>

    <h2 id="popupTitle">Chúc Mừng</h2>

    <img id="finalImage" src="" alt="result">

    <p id="score">⭐ Điểm: 0</p>

    <button id="closePopup">Chơi lại</button>

  </div>

</div>

<!-- AUDIO -->
<audio id="bgMusic" loop preload="auto">
  <source src="./Beauty And A Beat cut.mp3" type="audio/mpeg">
</audio>

<audio id="soundPick" preload="auto">
  <source src="./soundpick.mp3" type="audio/mpeg">
</audio>

<audio id="soundSnap" preload="auto">
  <source src="./soundsnap.mp3" type="audio/mpeg">
</audio>

<audio id="soundWin" preload="auto">
  <source src="./soundwin.mp3" type="audio/mpeg">
</audio>

<audio id="soundLose" preload="auto">
  <source src="./soundlose.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
